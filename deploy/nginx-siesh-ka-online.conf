# deploy/nginx-siesh-ka-online.conf
#
# Independent nginx server block for the Sieshka staging site, siesh-ka.online.
# This is a SEPARATE vhost from whatever already serves siesh-ka.ru on this
# same VPS/nginx instance — install this file alongside the existing config,
# do not edit the siesh-ka.ru server block at all.
#
# Install:
#   sudo cp deploy/nginx-siesh-ka-online.conf /etc/nginx/sites-available/siesh-ka.online
#   sudo ln -s /etc/nginx/sites-available/siesh-ka.online /etc/nginx/sites-enabled/
#   sudo nginx -t                     # validate BEFORE reloading
#   sudo systemctl reload nginx       # NOT restart — reload keeps siesh-ka.ru's
#                                      # existing connections/cert untouched
#
# Then obtain the certificate (certbot edits this file in place to add the
# 443 server block + ssl_certificate directives — do not hand-write the TLS
# block yourself, let certbot generate it against the actual proxy_pass
# above so a config typo can't accidentally point HTTPS traffic at the wrong
# place):
#   sudo certbot --nginx -d siesh-ka.online
#
# certbot's --nginx plugin only touches the server block matching the -d
# domain it's given — the existing siesh-ka.ru server block (and its own
# certificate, if any) is a completely separate file/block and is not
# involved in this command at all.

server {
    listen 80;
    listen [::]:80;
    server_name siesh-ka.online;

    # Staging domain serving the same catalog/content as the live site —
    # explicit noindex at the proxy layer as a second guard alongside the
    # app's own X-Robots-Tag header (app/main.py), in case that header is
    # ever accidentally dropped by a future app-layer change.
    add_header X-Robots-Tag "noindex, nofollow" always;

    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
