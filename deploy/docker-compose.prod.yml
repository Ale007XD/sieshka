# Production overlay for Sieshka.
#
# Run from the project root:
#   docker compose -f docker-compose.yml -f deploy/docker-compose.prod.yml up -d
#
# This file does NOT modify local-dev behaviour. It only *adds* production
# concerns (no public app port, resource limits, log rotation). The base
# docker-compose.yml stays the dev/default.
#
# WARNING — migrations: the base file mounts ./migrations into postgres'
# docker-entrypoint-initdb.d. That applies 001-004.sql ONLY on the FIRST init
# of an EMPTY postgres volume. DO NOT rely on initdb.d after the first Alembic
# migration lands — it diverges silently from alembic. For real prod, switch to
# `alembic upgrade head` and drop the initdb.d mount. Pre-prod runs with a
# fresh volume are fine as-is.
#
# REVISION (2026-07-20, sprint_m7_staging_deploy): the earlier version of this
# file ran its own `caddy` container publishing host ports 80/443. That's
# wrong for THIS VPS — nginx is already bound to port 80 there, serving the
# live siesh-ka.ru site (a completely separate, non-Docker deployment outside
# this repo). A second process trying to bind the same host ports would fail
# to start outright. Reverse-proxying + TLS for siesh-ka.online is handled by
# that SAME existing nginx instead (a new, independent server block — see
# deploy/nginx-siesh-ka-online.conf and DEPLOYMENT.md §3.3), not by a
# container in this compose file. The app container now publishes to
# 127.0.0.1 only, on a port (8001) chosen not to collide with anything else
# already running on this VPS — confirm free with `ss -ltnp | grep 8001`
# before first deploy, don't assume.

services:
  postgres:
    # Override the weak default password ('sieshka') with a value from .env.
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # Do not expose 5432 to the host in production.
    ports: []
    mem_limit: 512m
    cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  app:
    # localhost-only — nginx (already on this VPS) reverse-proxies to this
    # port for siesh-ka.online. NOT "0.0.0.0:8001" — binding all interfaces
    # would expose the app directly to the internet on 8001, bypassing nginx
    # (and its TLS termination) entirely.
    ports:
      - "127.0.0.1:8001:8000"
    environment:
      DATABASE_URL: ${DATABASE_URL}
    # Cap resources so a runaway LLM call can't eat the whole VPS.
    mem_limit: 1g
    cpus: "1.0"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

volumes: {}
