name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dev deps
        run: pip install -e ".[dev]" --upgrade

      - name: ruff check
        run: ruff check .

      - name: mypy
        run: mypy app/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dev deps
        run: pip install -e ".[dev]" --upgrade

      - name: pytest unit
        run: pytest tests/unit/ -v --tb=short

      # M3 migration gate: zero direct status mutations outside terminal tools
      - name: check no direct mutations
        run: bash scripts/check_no_direct_mutation.sh
