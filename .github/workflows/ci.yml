name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dev deps
        run: pip install -e ".[dev]" --upgrade

      - name: ruff check
        run: ruff check .

      - name: mypy
        run: mypy app/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dev deps
        run: pip install -e ".[dev]" --upgrade

      - name: pytest unit
        run: pytest tests/unit/ -v --tb=short

      # M1 gate: zero direct state assignments outside terminal tools
      - name: check no direct state mutations
        run: |
          count=$(grep -r 'status = \|state = ' --include='*.py' app/ | grep -v '# terminal-tool' | grep -v '\.py:.*#' | grep -v 'DEFAULT\|str,\|Enum\|None\|dict\|list\|bool\|int\|str =' | wc -l)
          echo "Direct state mutations found: $count"
          # In M3: this must be 0. In M1/M2: informational only.
