<div class="bg-white rounded-lg shadow overflow-hidden">
  <table class="min-w-full divide-y divide-gray-200">
    <thead class="bg-gray-50">
      <tr>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Name</th>
        <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Discount</th>
        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">State</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-gray-200">
      {% for promo in promotions %}
      <tr class="{{ PROMOTION_STATE_COLOR.get(promo.state, '') }}">
        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">{{ promo.name }}</td>
        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900 text-right">{{ promo.discount }}%</td>
        <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">{{ promo.state.value }}</td>
      </tr>
      {% else %}
      <tr>
        <td colspan="3" class="px-6 py-12 text-center text-sm text-gray-400">No promotions found.</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
